<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divisão de Frações - Banda Desenhada Animada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap');
        
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #f0f9ff;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes bounce-gentle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        @keyframes wiggle {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }
        @keyframes slideIn {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .animate-float { animation: float 4s ease-in-out infinite; }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
        .animate-bounce-gentle { animation: bounce-gentle 2s ease-in-out infinite; }
        .animate-wiggle { animation: wiggle 0.5s ease-in-out infinite; }
        .animate-slide { animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .animate-spin-slow { animation: spin-slow 20s linear infinite; }

        .speech-bubble {
            position: relative;
            background: #ffffff;
            border: 4px solid #1e293b;
            border-radius: 1.5rem;
            filter: drop-shadow(4px 4px 0px #1e293b);
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 30px;
            border-width: 15px 15px 0;
            border-style: solid;
            border-color: #ffffff transparent;
            display: block;
            width: 0;
            z-index: 1;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 28px;
            border-width: 17px 17px 0;
            border-style: solid;
            border-color: #1e293b transparent;
            display: block;
            width: 0;
            z-index: 0;
        }

        .speech-bubble-right::after {
            left: auto;
            right: 30px;
        }
        .speech-bubble-right::before {
            left: auto;
            right: 28px;
        }

        .comic-border {
            border: 4px solid #1e293b;
            box-shadow: 6px 6px 0px #1e293b;
        }
        .comic-btn-shadow {
            box-shadow: 4px 4px 0px #1e293b;
            transition: all 0.1s ease;
        }
        .comic-btn-shadow:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #1e293b;
        }

        /* Avatar em SVG nativo para não precisar de imagens externas */
        .avatar-frame {
            width: 130px;
            height: 130px;
            border: 4px solid #1e293b;
            border-radius: 50%;
            background: #ffcbd1;
            overflow: hidden;
            box-shadow: 4px 4px 0px #1e293b;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-between p-4 md:p-8 overflow-x-hidden">

    <header class="w-full max-w-4xl text-center mb-6 z-10">
        <div class="inline-block bg-yellow-400 comic-border px-8 py-3 rounded-2xl relative transform -rotate-1 animate-float">
            <span class="absolute -top-3 -left-3 text-2xl">✨</span>
            <span class="absolute -bottom-3 -right-3 text-2xl">✨</span>
            <h1 class="text-3xl md:text-5xl font-black text-slate-800 tracking-wider uppercase select-none">
                ⚡ DIVISÃO DE FRAÇÕES ⚡
            </h1>
        </div>
        <p class="text-slate-600 mt-4 text-lg font-medium">Clica em "Seguinte" para ver os desenhos ganharem vida!</p>
    </header>

    <main class="w-full max-w-4xl flex-grow flex items-center justify-center my-4 z-10">
        <div id="comic-container" class="w-full bg-white comic-border rounded-3xl p-6 md:p-8 relative min-h-[480px] flex flex-col justify-between transition-all duration-300">
            
            <div class="absolute top-4 left-4 bg-black text-white text-xl font-bold px-4 py-1.5 rounded-xl comic-border transform -rotate-3 z-20 shadow-md" id="panel-number">
                1
            </div>

            <div class="absolute inset-0 opacity-5 pointer-events-none rounded-3xl overflow-hidden" id="action-bg">
                <div class="w-full h-full animate-spin-slow bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-yellow-300 via-transparent to-transparent scale-150"></div>
            </div>

            <div id="frame-content" class="flex-grow flex flex-col md:flex-row items-center justify-around gap-6 py-6 relative z-10">
                </div>

            <div class="flex flex-col sm:flex-row items-center justify-between gap-4 mt-6 pt-4 border-t-4 border-dashed border-slate-200">
                <div class="w-full sm:w-1/3 flex flex-col gap-1.5">
                    <div class="flex justify-between text-sm font-bold text-slate-500 px-1">
                        <span>Progresso da Aula</span>
                        <span id="progress-text">25%</span>
                    </div>
                    <div class="w-full h-5 bg-slate-100 rounded-full border-4 border-slate-800 p-0.5 overflow-hidden">
                        <div id="progress-bar" class="h-full bg-emerald-400 rounded-full transition-all duration-500 ease-out"></div>
                    </div>
                </div>

                <div class="flex gap-4 w-full sm:w-auto justify-end">
                    <button id="btn-prev" class="comic-btn-shadow px-6 py-3 bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold rounded-2xl border-4 border-slate-800 flex items-center gap-2">
                        Anterior
                    </button>
                    <button id="btn-next" class="comic-btn-shadow px-8 py-3 bg-yellow-400 hover:bg-yellow-300 text-slate-900 font-black rounded-2xl border-4 border-slate-800 flex items-center gap-2">
                        <span>Seguinte</span>
                    </button>
                </div>
            </div>

        </div>
    </main>

    <div id="game-modal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg comic-border rounded-3xl p-6 relative animate-pop">
            <button id="close-game" class="absolute -top-3 -right-3 bg-rose-500 text-white rounded-full p-2 border-4 border-slate-800 comic-btn-shadow face-close font-bold w-10 h-10 flex items-center justify-center">
                X
            </button>
            
            <div class="text-center mb-6">
                <span class="text-4xl">🎮</span>
                <h3 class="text-2xl font-black text-slate-800 mt-2 uppercase">Desafio de Divisões!</h3>
                <p class="text-slate-500 text-sm font-semibold">Mostra o que aprendeste com o nosso herói!</p>
            </div>

            <div id="game-arena" class="bg-sky-50 rounded-2xl border-4 border-slate-800 p-4 text-center">
                <div class="flex items-center justify-center gap-4 text-2xl font-black text-slate-800 mb-6">
                    <div class="flex flex-col items-center">
                        <span id="g-num1">1</span>
                        <div class="w-8 h-1 bg-slate-800 my-1"></div>
                        <span id="g-den1">3</span>
                    </div>
                    <span class="text-3xl text-indigo-600">÷</span>
                    <div class="flex flex-col items-center">
                        <span id="g-num2">2</span>
                        <div class="w-8 h-1 bg-slate-800 my-1"></div>
                        <span id="g-den2">5</span>
                    </div>
                    <span class="text-3xl text-slate-500">=</span>
                    <div class="flex flex-col items-center bg-white p-2 rounded-xl border-2 border-dashed border-indigo-400">
                        <input type="number" id="ans-num" class="w-12 text-center bg-slate-100 border-2 border-slate-300 rounded p-1 font-bold" placeholder="?">
                        <div class="w-10 h-1 bg-slate-800 my-1"></div>
                        <input type="number" id="ans-den" class="w-12 text-center bg-slate-100 border-2 border-slate-300 rounded p-1 font-bold" placeholder="?">
                    </div>
                </div>
                <div id="game-feedback" class="text-lg font-bold min-h-[30px] mb-4 text-slate-700"></div>
                <button id="btn-check-answer" class="w-full comic-btn-shadow py-3 bg-emerald-400 hover:bg-emerald-300 border-4 border-slate-800 font-bold rounded-2xl text-slate-900">
                    Verificar Resposta! 🌟
                </button>
            </div>
        </div>
    </div>

    <footer class="text-center text-xs font-bold text-slate-400 mt-4">
        Divertido • Educativo • Interativo &copy; 2026
    </footer>

    <script>
        // Avatares desenhados em formato SVG diretamente no código (não quebram nunca!)
        const charactersSVG = {
            tomas: `
                <div class="flex flex-col items-center animate-bounce-gentle">
                    <div class="avatar-frame bg-sky-200 flex items-center justify-center relative">
                        <svg viewBox="0 0 100 100" class="w-full h-full">
                            <circle cx="50" cy="55" r="30" fill="#ffdbac"/>
                            <path d="M20 45 q10 -25 30 -20 q20 -5 30 20 Z" fill="#1e293b"/>
                            <circle cx="40" cy="50" r="4" fill="#1e293b"/>
                            <circle cx="60" cy="50" r="4" fill="#1e293b"/>
                            <path d="M42 65 q8 5 16 0" stroke="#1e293b" stroke-width="3" fill="none"/>
                        </svg>
                    </div>
                    <span class="mt-2 bg-slate-800 text-white px-3 py-0.5 rounded-full text-xs font-bold">Tomás</span>
                </div>`,
            sara: `
                <div class="flex flex-col items-center animate-bounce-gentle">
                    <div class="avatar-frame bg-purple-200 flex items-center justify-center relative">
                        <svg viewBox="0 0 100 100" class="w-full h-full">
                            <circle cx="50" cy="55" r="30" fill="#f1c27d"/>
                            <path d="M15 50 q5 -30 35 -30 q30 0 35 30" fill="#f59e0b"/>
                            <circle cx="22" cy="60" r="10" fill="#f59e0b"/>
                            <circle cx="78" cy="60" r="10" fill="#f59e0b"/>
                            <circle cx="40" cy="55" r="4" fill="#1e293b"/>
                            <circle cx="60" cy="55" r="4" fill="#1e293b"/>
                            <path d="M44 68 q6 6 12 0" stroke="#1e293b" stroke-width="3" fill="none"/>
                        </svg>
                    </div>
                    <span class="mt-2 bg-slate-800 text-white px-3 py-0.5 rounded-full text-xs font-bold">Sara</span>
                </div>`
        };

        const comicFrames = [
            {
                number: 1,
                bgColor: "from-sky-50 to-sky-100",
                html: () => `
                    ${charactersSVG.tomas}
                    <div class="flex-1 max-w-sm speech-bubble p-4 text-slate-800 font-semibold text-lg">
                        Como faço para resolver uma divisão de frações como <span class="font-black text-indigo-600">3/4 ÷ 2/5</span>? Parece impossível!
                    </div>
                `
            },
            {
                number: 2,
                bgColor: "from-purple-50 to-purple-100",
                html: () => `
                    <div class="flex-1 max-w-sm speech-bubble speech-bubble-right p-4 text-slate-800 font-semibold text-lg order-2 md:order-1">
                        É super fácil, Tomás! O segredo é: <span class="text-purple-600 font-bold">Mantém</span> a primeira fração e <span class="text-rose-500 font-bold">Inverte</span> a segunda!
                    </div>
                    <div class="order-1 md:order-2">${charactersSVG.sara}</div>
                `
            },
            {
                number: 3,
                bgColor: "from-amber-50 to-amber-100",
                html: () => `
                    ${charactersSVG.tomas}
                    <div class="flex-1 max-w-sm speech-bubble p-4 text-slate-800 font-semibold text-lg">
                        Ah! Então a divisão vira uma multiplicação? Fica <span class="font-black text-emerald-600">3/4 × 5/2</span>?
                    </div>
                `
            },
            {
                number: 4,
                bgColor: "from-emerald-50 to-emerald-100",
                html: () => `
                    <div class="flex-1 max-w-sm speech-bubble speech-bubble-right p-4 text-slate-800 font-semibold text-lg order-2 md:order-1">
                        Exatamente! Agora é só multiplicar direto: de cima com de cima (<span class="text-emerald-600 font-bold">3×5=15</span>) e de baixo com de baixo (<span class="text-rose-500 font-bold">4×2=8</span>). Resultado: <span class="font-black">15/8</span>!
                    </div>
                    <div class="order-1 md:order-2">${charactersSVG.sara}</div>
                `
            }
        ];

        let currentFrameIndex = 0;

        const container = document.getElementById('comic-container');
        const frameContent = document.getElementById('frame-content');
        const panelNumber = document.getElementById('panel-number');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        function updateFrame() {
            const frame = comicFrames[currentFrameIndex];
            
            // Atualiza número do painel e background animado
            panelNumber.innerText = frame.number;
            container.className = `w-full bg-white comic-border rounded-3xl p-6 md:p-8 relative min-h-[480px] flex flex-col justify-between transition-all duration-500 bg-gradient-to-br ${frame.bgColor}`;
            
            // Insere conteúdo do frame
            frameContent.innerHTML = frame.html();

            // Atualiza barra de progresso
            const percent = ((currentFrameIndex + 1) / comicFrames.length) * 100;
            progressBar.style.width = `${percent}%`;
            progressText.innerText = `${Math.round(percent)}%`;

            // Controla textos do botão
            btnPrev.disabled = currentFrameIndex === 0;
            btnPrev.style.opacity = currentFrameIndex === 0 ? "0.5" : "1";

            if (currentFrameIndex === comicFrames.length - 1) {
                btnNext.innerHTML = 'Praticar! 🎮';
            } else {
                btnNext.innerHTML = 'Seguinte ➡️';
            }
        }

        btnNext.addEventListener('click', () => {
            if (currentFrameIndex < comicFrames.length - 1) {
                currentFrameIndex++;
                updateFrame();
            } else {
                document.getElementById('game-modal').classList.remove('hidden');
                generateGameQuestion();
            }
        });

        btnPrev.addEventListener('click', () => {
            if (currentFrameIndex > 0) {
                currentFrameIndex--;
                updateFrame();
            }
        });

        // Lógica do minijogo
        function generateGameQuestion() {
            document.getElementById('ans-num').value = '';
            document.getElementById('ans-den').value = '';
            document.getElementById('game-feedback').innerText = '';
            
            // Gera números aleatórios fáceis
            document.getElementById('g-num1').innerText = Math.floor(Math.random() * 4) + 1;
            document.getElementById('g-den1').innerText = Math.floor(Math.random() * 4) + 2;
            document.getElementById('g-num2').innerText = Math.floor(Math.random() * 4) + 1;
            document.getElementById('g-den2').innerText = Math.floor(Math.random() * 4) + 2;
        }

        document.getElementById('btn-check-answer').addEventListener('click', () => {
            const n1 = parseInt(document.getElementById('g-num1').innerText);
            const d1 = parseInt(document.getElementById('g-den1').innerText);
            const n2 = parseInt(document.getElementById('g-num2').innerText);
            const d2 = parseInt(document.getElementById('g-den2').innerText);

            const correctNum = n1 * d2;
            const correctDen = d1 * n2;

            const userNum = parseInt(document.getElementById('ans-num').value);
            const userDen = parseInt(document.getElementById('ans-den').value);

            const feedback = document.getElementById('game-feedback');

            if (userNum === correctNum && userDen === correctDen) {
                feedback.innerHTML = "<span class='text-emerald-500'>🎉 Incrível! Acertaste em cheio! 🔄 Mântiveste a primeira e inverteste a segunda com perfeição!</span>";
                setTimeout(generateGameQuestion, 3000);
            } else {
                feedback.innerHTML = `<span class='text-rose-500'>❌ Quase lá! Lembra-te: faz ${n1} × ${d2} em cima e ${d1} × ${n2} em baixo!</span>`;
            }
        });

        document.getElementById('close-game').addEventListener('click', () => {
            document.getElementById('game-modal').classList.add('hidden');
        });

        // Inicializa o primeiro quadro
        updateFrame();
    </script>
</body>
    </html>
